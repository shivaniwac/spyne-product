<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyne Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
        }

        .card{
            background:#111827;
            padding:50px;
            width:420px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.4);
        }

        h1{
            margin-bottom:10px;
            font-size:32px;
        }

        p{
            color:#94a3b8;
            margin-bottom:35px;
        }

        .btn{
            display:block;
            text-decoration:none;
            background:#2563eb;
            color:white;
            padding:16px;
            margin:15px 0;
            border-radius:12px;
            font-size:18px;
            transition:0.3s;
        }

        .btn:hover{
            background:#1d4ed8;
            transform:translateY(-2px);
        }

    </style>

</head>

<body>

    <div class="card">

        <h1>Spyne Product</h1>

        <p>Select a page</p>

        <a class="btn" href="vini_interview_guide_Final.html">
            Open Interview Guide
        </a>

        <a class="btn" href="vini_playbook_v4.html">
            Open Playbook
        </a>

    </div>

</body>
</html>
